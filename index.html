<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>viv08 - Hệ thống Nghiệp vụ số</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .fade-in { animation: fadeIn 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    input:focus, select:focus { border-color: #2563eb !important; ring: 2px; ring-color: #dbeafe; }
  </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [view, setView] = useState('home'); 
      const [loading, setLoading] = useState(false);
      const [success, setSuccess] = useState(false);
      const [selectedFile, setSelectedFile] = useState(null);
      
      const [formData, setFormData] = useState({
        teacherName: '',
        department: 'Tổ 1',
        grade: 'Khối 1',
        fileTitle: ''
      });

      // ĐÃ CẬP NHẬT LINK CỦA BẠN TẠI ĐÂY
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxWli1nm_BuPlQQcsBnV7UJfDJ3WJvKqW6BjLPfVwwigpgXKhcoqXTQd_r0o6qyUWr9/exec";

      const handleBack = () => {
        setView('home');
        setSuccess(false);
        setSelectedFile(null);
        setFormData({ ...formData, fileTitle: '' });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!selectedFile) return alert("Thầy/Cô vui lòng chọn tệp đính kèm!");
        
        setLoading(true);

        const reader = new FileReader();
        reader.readAsDataURL(selectedFile);
        reader.onload = function () {
          const base64Data = reader.result.split(',')[1];
          
          fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // Dùng no-cors để tránh lỗi chính sách bảo mật trình duyệt với GAS
            body: JSON.stringify({
              teacherName: formData.teacherName,
              department: formData.department,
              fileTitle: formData.fileTitle,
              fileName: selectedFile.name,
              fileType: selectedFile.type,
              fileBase64: base64Data
            })
          })
          .then(() => {
            // Với no-cors, chúng ta không đọc được response nhưng nếu không nhảy vào .catch là đã gửi đi
            setLoading(false);
            setSuccess(true);
          })
          .catch(err => {
            setLoading(false);
            alert("Có lỗi xảy ra khi kết nối. Thầy/Cô vui lòng thử lại!");
            console.error(err);
          });
        };
      };

      useEffect(() => { lucide.createIcons(); }, [view, success, selectedFile, loading]);

      return (
        <div className="min-h-screen pb-32">
          {/* Header */}
          <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-slate-100 px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                <i data-lucide="school" className="w-5 h-5"></i>
              </div>
              <div>
                <h1 className="text-lg font-bold leading-none">viv08</h1>
                <p className="text-[10px] text-blue-600 font-bold uppercase mt-1">Trưng Vương • 2026</p>
              </div>
            </div>
          </nav>

          {view === 'home' ? (
            <main className="max-w-md mx-auto p-6 space-y-6 fade-in">
              <div className="bg-slate-900 rounded-[32px] p-8 text-white relative overflow-hidden shadow-xl">
                <div className="relative z-10">
                  <p className="text-blue-400 text-[10px] font-bold uppercase tracking-widest">Hệ thống nghiệp vụ số</p>
                  <h2 className="text-2xl font-bold mt-2">Xin chào,<br/>Thầy/Cô giáo</h2>
                </div>
                <div className="absolute -right-6 -bottom-6 w-32 h-32 bg-blue-600 rounded-full blur-[60px] opacity-40"></div>
              </div>

              <div className="grid grid-cols-1 gap-4">
                <button onClick={() => setView('upload_khbd')} className="bg-white p-6 rounded-3xl border border-slate-100 flex items-center gap-5 active:scale-95 transition-all text-left shadow-sm">
                  <div className="w-14 h-14 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center flex-shrink-0">
                    <i data-lucide="file-text" className="w-7 h-7"></i>
                  </div>
                  <div>
                    <h3 className="font-bold text-slate-800">Kế hoạch bài dạy</h3>
                    <p className="text-[11px] text-slate-400 mt-0.5">Nộp giáo án tuần, tháng, học kỳ</p>
                  </div>
                </button>

                <button onClick={() => setView('upload_tulieu')} className="bg-white p-6 rounded-3xl border border-slate-100 flex items-center gap-5 active:scale-95 transition-all text-left shadow-sm">
                  <div className="w-14 h-14 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center flex-shrink-0">
                    <i data-lucide="folder-kanban" className="w-7 h-7"></i>
                  </div>
                  <div>
                    <h3 className="font-bold text-slate-800">Tư liệu & Hồ sơ</h3>
                    <p className="text-[11px] text-slate-400 mt-0.5">Phiếu bài tập, minh chứng cá nhân</p>
                  </div>
                </button>
              </div>
            </main>
          ) : (
            <main className="max-w-md mx-auto p-6 fade-in">
              <button onClick={handleBack} className="flex items-center gap-2 text-slate-400 mb-6 font-bold text-[10px] uppercase tracking-widest">
                <i data-lucide="chevron-left" className="w-4 h-4"></i> Quay lại
              </button>

              {success ? (
                <div className="bg-white rounded-[32px] p-10 text-center shadow-lg border border-slate-50 fade-in">
                  <div className="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                    <i data-lucide="check-circle-2" className="w-10 h-10"></i>
                  </div>
                  <h2 className="text-xl font-bold text-slate-900 mb-2">Gửi thành công!</h2>
                  <p className="text-slate-500 text-xs mb-8">Hệ thống đã nhận được tệp của Thầy/Cô và đang chuyển vào thư mục Drive.</p>
                  <button onClick={handleBack} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all">Nộp thêm tệp khác</button>
                </div>
              ) : (
                <form onSubmit={handleSubmit} className="bg-white rounded-[32px] p-7 shadow-lg border border-slate-50 space-y-5">
                  <h2 className="text-center font-bold text-slate-800 mb-2">{view === 'upload_khbd' ? 'Nộp Giáo án / KHBD' : 'Nộp Tư liệu / Hồ sơ'}</h2>
                  
                  <div className="space-y-4">
                    <div>
                      <label className="text-[10px] font-bold uppercase text-slate-400 ml-1">Họ và tên giáo viên</label>
                      <input required type="text" placeholder="Ghi đầy đủ họ tên..." className="w-full px-4 py-3.5 bg-slate-50 border border-transparent rounded-xl text-sm font-bold mt-1 outline-none transition-all" value={formData.teacherName} onChange={(e) => setFormData({...formData, teacherName: e.target.value})} />
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="text-[10px] font-bold uppercase text-slate-400 ml-1">Tổ chuyên môn</label>
                        <select className="w-full px-4 py-3.5 bg-slate-50 border border-transparent rounded-xl text-sm font-bold mt-1 outline-none" value={formData.department} onChange={(e) => setFormData({...formData, department: e.target.value})}>
                          {['Tổ 1', 'Tổ 2', 'Tổ 3', 'Tổ 4', 'Tổ 5', 'Văn phòng'].map(v => <option key={v}>{v}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[10px] font-bold uppercase text-slate-400 ml-1">Khối lớp</label>
                        <select className="w-full px-4 py-3.5 bg-slate-50 border border-transparent rounded-xl text-sm font-bold mt-1 outline-none" value={formData.grade} onChange={(e) => setFormData({...formData, grade: e.target.value})}>
                          {['Khối 1', 'Khối 2', 'Khối 3', 'Khối 4', 'Khối 5', 'Đặc thù'].map(v => <option key={v}>{v}</option>)}
                        </select>
                      </div>
                    </div>

                    <div>
                      <label className="text-[10px] font-bold uppercase text-slate-400 ml-1">Tên hồ sơ / Bài dạy</label>
                      <input required type="text" placeholder="Ví dụ: Tuần 5, Toán tiết 20..." className="w-full px-4 py-3.5 bg-slate-50 border border-transparent rounded-xl text-sm font-bold mt-1 outline-none transition-all" value={formData.fileTitle} onChange={(e) => setFormData({...formData, fileTitle: e.target.value})} />
                    </div>

                    <div onClick={() => !loading && document.getElementById('file-upload').click()} className={`p-8 border-2 border-dashed rounded-[28px] flex flex-col items-center justify-center gap-3 transition-all cursor-pointer ${selectedFile ? 'border-blue-200 bg-blue-50/50' : 'border-slate-100 bg-slate-50/50'}`}>
                      <input id="file-upload" type="file" className="hidden" onChange={(e) => setSelectedFile(e.target.files[0])} disabled={loading} />
                      <div className={`w-12 h-12 rounded-2xl flex items-center justify-center shadow-sm ${selectedFile ? 'bg-blue-600 text-white' : 'bg-white text-blue-600'}`}>
                        <i data-lucide={selectedFile ? "check" : "upload-cloud"} className="w-6 h-6"></i>
                      </div>
                      <div className="text-center">
                        <p className="text-xs font-bold text-slate-700">{selectedFile ? selectedFile.name : 'Chọn tệp từ điện thoại'}</p>
                        {!selectedFile && <p className="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-tight">PDF, Word, Ảnh, Zip...</p>}
                      </div>
                    </div>
                  </div>

                  <button disabled={loading} type="submit" className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-lg shadow-blue-100 transition-all active:scale-95">
                    {loading ? <i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i> : <i data-lucide="send" className="w-5 h-5"></i>}
                    <span className="uppercase text-sm tracking-wide">{loading ? 'Đang tải lên...' : 'Xác nhận gửi'}</span>
                  </button>
                </form>
              )}
            </main>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
