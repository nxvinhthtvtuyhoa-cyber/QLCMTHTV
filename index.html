<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>viv08 - Hệ thống Nghiệp vụ số</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Custom animation for smooth UI */
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [view, setView] = useState('home'); 
      const [loading, setLoading] = useState(false);
      const [success, setSuccess] = useState(false);
      const [formData, setFormData] = useState({
        teacherName: '',
        department: 'Tổ 1',
        grade: 'Khối 1',
        fileTitle: '',
        note: ''
      });

      const handleBack = () => {
        setView('home');
        setSuccess(false);
        setFormData({ ...formData, fileTitle: '' });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setLoading(true);
        // Mô phỏng gửi dữ liệu (Vì chạy trên CDN nên tạm thời ngắt kết nối Firebase phức tạp)
        setTimeout(() => {
          setLoading(false);
          setSuccess(true);
        }, 1500);
      };

      const FeatureCard = ({ icon, title, desc, color, targetView }) => (
        <button 
          onClick={() => setView(targetView)}
          className="w-full bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 flex flex-col items-start gap-4 active:scale-95 transition-all text-left group"
        >
          <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${color} bg-opacity-10 text-blue-600 group-hover:scale-110 transition-transform`}>
            <i data-lucide={icon} className="w-6 h-6"></i>
          </div>
          <div>
            <h3 className="font-bold text-slate-800 text-lg">{title}</h3>
            <p className="text-xs text-slate-400 font-medium mt-1">{desc}</p>
          </div>
        </button>
      );

      // Render lại icon Lucide sau khi React load xong
      useEffect(() => { lucide.createIcons(); }, [view, success]);

      return (
        <div className="min-h-screen pb-32">
          {/* Navigation Bar */}
          <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 px-6 py-4 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i data-lucide="school" className="w-5 h-5"></i>
              </div>
              <div>
                <h1 className="text-lg font-extrabold tracking-tight leading-none">viv08</h1>
                <p className="text-[8px] font-black text-blue-600 uppercase tracking-widest leading-none mt-1">Trưng Vương • 2026</p>
              </div>
            </div>
            <button className="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-400 relative">
              <i data-lucide="bell" className="w-5 h-5"></i>
              <span className="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
            </button>
          </nav>

          {view === 'home' ? (
            <main className="max-w-md mx-auto p-6 space-y-8 fade-in">
              {/* Welcome Card */}
              <div className="bg-slate-900 rounded-[35px] p-8 text-white relative overflow-hidden shadow-2xl shadow-blue-100">
                <div className="relative z-10">
                  <span className="text-blue-400 text-[10px] font-bold uppercase tracking-[0.2em]">Hệ thống nghiệp vụ số</span>
                  <h2 className="text-2xl font-bold mt-2">Kính chào,<br/>Thầy/Cô giáo</h2>
                  <div className="mt-6 flex items-center gap-2">
                    <div className="px-3 py-1.5 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 backdrop-blur-md">
                      TH Trưng Vương
                    </div>
                    <div className="px-3 py-1.5 bg-white/10 rounded-full text-[10px] font-bold border border-white/10 backdrop-blur-md">
                      Đắk Lắk
                    </div>
                  </div>
                </div>
                <div className="absolute -right-10 -bottom-10 w-40 h-40 bg-blue-600 rounded-full blur-[80px] opacity-40"></div>
              </div>

              {/* Feature Grid */}
              <section className="space-y-4">
                <div className="flex items-center gap-3 px-1">
                  <div className="w-6 h-1.5 bg-blue-600 rounded-full"></div>
                  <h3 className="text-[11px] font-black uppercase tracking-widest text-slate-400">Danh mục hồ sơ</h3>
                </div>
                <div className="grid grid-cols-1 gap-4">
                  <FeatureCard icon="file-text" title="Kế hoạch bài dạy" desc="Nộp giáo án, kế hoạch dạy học tuần/tháng" color="bg-blue-500" targetView="upload_khbd" />
                  <FeatureCard icon="book-open" title="Tư liệu dạy học" desc="Phiếu bài tập, video, tranh ảnh minh họa" color="bg-emerald-500" targetView="upload_tulieu" />
                  <FeatureCard icon="user-circle" title="Hồ sơ cá nhân" desc="Bằng cấp, chứng chỉ, minh chứng thi đua" color="bg-purple-500" targetView="upload_hoso" />
                </div>
              </section>
            </main>
          ) : (
            /* Form Submission View */
            <main className="max-w-md mx-auto p-6 fade-in">
              <button onClick={handleBack} className="flex items-center gap-2 text-slate-400 mb-6 font-bold text-xs uppercase tracking-widest active:scale-95 transition-transform">
                <i data-lucide="chevron-left" className="w-4 h-4"></i> Quay lại trang chủ
              </button>

              {success ? (
                <div className="bg-white rounded-[40px] p-10 text-center shadow-xl border border-slate-50">
                  <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                    <i data-lucide="check-circle-2" className="w-10 h-10"></i>
                  </div>
                  <h2 className="text-2xl font-black text-slate-900 mb-2">Đã nộp thành công!</h2>
                  <p className="text-slate-500 text-sm mb-8 leading-relaxed px-4">Hồ sơ đã được viv08 ghi nhận và lưu trữ an toàn.</p>
                  <button onClick={handleBack} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold active:scale-95 transition-transform shadow-lg">
                    Tiếp tục nộp hồ sơ khác
                  </button>
                </div>
              ) : (
                <form onSubmit={handleSubmit} className="bg-white rounded-[40px] p-8 shadow-sm border border-slate-50 space-y-6">
                  <div className="text-center mb-2">
                    <h2 className="text-xl font-black text-slate-800 leading-tight">
                      {view === 'upload_khbd' ? 'Nộp Kế hoạch bài dạy' : view === 'upload_tulieu' ? 'Nộp Tư liệu dạy học' : 'Cập nhật Hồ sơ cá nhân'}
                    </h2>
                    <p className="text-[10px] text-blue-600 mt-1 uppercase font-black tracking-[0.2em]">Hồ sơ điện tử 2026</p>
                  </div>

                  <div className="space-y-5">
                    <div className="space-y-1.5">
                      <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Họ và tên Giáo viên</label>
                      <input required type="text" placeholder="Nhập tên đầy đủ..." className="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none font-bold" value={formData.teacherName} onChange={(e) => setFormData({...formData, teacherName: e.target.value})} />
                    </div>

                    <div className="grid grid-cols-2 gap-3">
                      <div className="space-y-1.5">
                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Tổ chuyên môn</label>
                        <select className="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl text-sm font-bold outline-none appearance-none" value={formData.department} onChange={(e) => setFormData({...formData, department: e.target.value})}>
                          {['Tổ 1', 'Tổ 2', 'Tổ 3', 'Tổ 4', 'Tổ 5', 'Văn phòng'].map(opt => <option key={opt}>{opt}</option>)}
                        </select>
                      </div>
                      <div className="space-y-1.5">
                        <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Khối lớp</label>
                        <select className="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl text-sm font-bold outline-none appearance-none" value={formData.grade} onChange={(e) => setFormData({...formData, grade: e.target.value})}>
                          {['Khối 1', 'Khối 2', 'Khối 3', 'Khối 4', 'Khối 5', 'Đặc thù'].map(opt => <option key={opt}>{opt}</option>)}
                        </select>
                      </div>
                    </div>

                    <div className="space-y-1.5">
                      <label className="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-2">Tên hồ sơ / Tên bài</label>
                      <input required type="text" placeholder="Toán tiết 20, Kế hoạch tuần 5..." className="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none font-bold" value={formData.fileTitle} onChange={(e) => setFormData({...formData, fileTitle: e.target.value})} />
                    </div>

                    <div className="p-8 border-2 border-dashed border-slate-100 rounded-[35px] flex flex-col items-center justify-center gap-3 bg-slate-50/50 hover:bg-blue-50 hover:border-blue-200 transition-all cursor-pointer group active:scale-[0.98]">
                      <div className="w-14 h-14 bg-white text-blue-600 rounded-2xl flex items-center justify-center shadow-sm group-hover:rotate-12 transition-transform">
                        <i data-lucide="cloud-upload" className="w-7 h-7"></i>
                      </div>
                      <div className="text-center">
                        <p className="text-sm font-bold text-slate-700">Chọn tệp nộp</p>
                        <p className="text-[9px] text-slate-400 mt-1 uppercase font-black tracking-widest">PDF, DOCX, ZIP</p>
                      </div>
                    </div>
                  </div>

                  <button disabled={loading} type="submit" className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white py-4 rounded-[22px] font-bold flex items-center justify-center gap-3 shadow-xl shadow-blue-100 transition-all active:scale-95">
                    {loading ? <i data-lucide="loader-2" className="w-5 h-5 animate-spin"></i> : <i data-lucide="send" className="w-5 h-5"></i>}
                    <span className="tracking-wide uppercase text-sm">{loading ? 'Đang gửi...' : 'Xác nhận nộp hồ sơ'}</span>
                  </button>
                </form>
              )}
            </main>
          )}

          {/* Bottom Navigation */}
          <div className="fixed bottom-8 inset-x-6 z-40 max-w-sm mx-auto">
            <div className="bg-slate-900/90 backdrop-blur-2xl rounded-[30px] border border-white/10 shadow-2xl p-2 flex justify-around items-center">
              <button onClick={() => setView('home')} className={`flex flex-col items-center gap-1.5 p-3 px-6 rounded-[22px] transition-all ${view === 'home' ? 'text-white bg-white/10' : 'text-slate-500 opacity-60'}`}>
                <i data-lucide="home" className="w-5 h-5"></i>
                <span className="text-[9px] font-black uppercase tracking-tighter">Trang chủ</span>
              </button>
              <div className="w-px h-6 bg-white/5"></div>
              <button className="flex flex-col items-center gap-1.5 p-3 px-6 rounded-[22px] text-slate-500 opacity-60">
                <i data-lucide="menu" className="w-5 h-5"></i>
                <span className="text-[9px] font-black uppercase tracking-tighter">Tiện ích</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
